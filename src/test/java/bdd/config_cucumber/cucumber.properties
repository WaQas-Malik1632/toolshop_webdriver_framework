# ???????????????????????????????????????????????????????????????????????????
#                    CUCUMBER CONFIGURATION PROPERTIES
#                    Best Practices for BDD Testing
# ???????????????????????????????????????????????????????????????????????????

# ???????????????????????????????????????????????????????????????????????????
# GLUE PATH - Where Cucumber finds step definitions and hooks
# ???????????????????????????????????????????????????????????????????????????
cucumber.glue=com.toolshop.qa.bdd.stepdefinitions,com.toolshop.qa.bdd.hooks

# ???????????????????????????????????????????????????????????????????????????
# FEATURE FILES - Location of .feature files
# ???????????????????????????????????????????????????????????????????????????
cucumber.features=src/test/java/com/toolshop/qa/bdd/features

# ???????????????????????????????????????????????????????????????????????????
# PLUGIN CONFIGURATION - Enhanced reporting with multiple formats
# ???????????????????????????????????????????????????????????????????????????
# pretty: Console output with colors
# html: HTML report for quick viewing
# json: JSON report for CI/CD integration
# junit: JUnit XML for Jenkins/CI integration
# timeline: Timeline report showing execution flow
# rerun: Generates rerun file for failed scenarios
# io.qameta.allure: Allure report integration
cucumber.plugin=\
  pretty,\
  html:target/cucumber-reports/cucumber-report.html,\
  json:target/cucumber-reports/cucumber.json,\
  junit:target/cucumber-reports/cucumber.xml,\
  timeline:target/cucumber-reports/timeline,\
  rerun:target/cucumber-reports/rerun.txt,\
  io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm

# ???????????????????????????????????????????????????????????????????????????
# EXECUTION OPTIONS
# ???????????????????????????????????????????????????????????????????????????
# Dry run: Check if all steps have definitions without executing them
cucumber.execution.dry-run=false

# Strict mode: Fail if there are undefined or pending steps (deprecated in Cucumber 7+)
# Use cucumber.execution.strict instead
cucumber.execution.strict=true

# Fail fast: Stop execution on first failure (useful for quick feedback)
# cucumber.execution.wip=false

# Parallel execution: Enable parallel scenario execution
# Note: Configure thread count in TestNG suite XML or runner
cucumber.execution.parallel.enabled=false

# ???????????????????????????????????????????????????????????????????????????
# FORMATTING OPTIONS
# ???????????????????????????????????????????????????????????????????????????
# Monochrome: Remove colors from console output (useful for CI logs)
cucumber.ansi-colors.disabled=false

# Snippet type: Code style for generated step definitions
# Options: underscore, camelcase
cucumber.snippet-type=camelcase

# ???????????????????????????????????????????????????????????????????????????
# FILTERING OPTIONS
# ???????????????????????????????????????????????????????????????????????????
# Filter scenarios by tags (can be overridden in runner)
# cucumber.filter.tags=@Smoke and not @Ignore

# Filter scenarios by name pattern
# cucumber.filter.name=.*login.*

# ???????????????????????????????????????????????????????????????????????????
# PUBLISHING OPTIONS
# ???????????????????????????????????????????????????????????????????????????
# Publish results to Cucumber Reports (https://reports.cucumber.io)
# Set to false for private/internal projects
cucumber.publish.enabled=false

# Quiet mode: Suppress Cucumber banner and publish messages
cucumber.publish.quiet=true

# Token for publishing (leave empty to disable)
# cucumber.publish.token=

# ???????????????????????????????????????????????????????????????????????????
# OBJECT FACTORY (Dependency Injection)
# ???????????????????????????????????????????????????????????????????????????
# Use TestNG object factory for better integration
# cucumber.object-factory=io.cucumber.testng.TestNGCucumberRunner

# ???????????????????????????????????????????????????????????????????????????
# BEST PRACTICES NOTES
# ???????????????????????????????????????????????????????????????????????????
# 1. Keep feature files focused and readable
# 2. Use tags for organizing scenarios (@Smoke, @Regression, @WIP)
# 3. Enable multiple report formats for different audiences
# 4. Use rerun.txt to retry only failed scenarios
# 5. Keep step definitions DRY (Don't Repeat Yourself)
# 6. Use Background for common setup steps
# 7. Use Scenario Outline for data-driven tests
# 8. Keep scenarios independent (no dependencies between scenarios)
# 9. Use meaningful scenario and step names
# 10. Leverage hooks for setup/teardown instead of step definitions

# ???????????????????????????????????????????????????????????????????????????
# REPORTING OUTPUTS
# ???????????????????????????????????????????????????????????????????????????
# HTML Report:     target/cucumber-reports/cucumber-report.html
# JSON Report:     target/cucumber-reports/cucumber.json
# JUnit XML:       target/cucumber-reports/cucumber.xml
# Timeline:        target/cucumber-reports/timeline/index.html
# Rerun File:      target/cucumber-reports/rerun.txt
# Allure Results:  target/allure-results/

# ???????????????????????????????????????????????????????????????????????????
# RERUN FAILED SCENARIOS
# ???????????????????????????????????????????????????????????????????????????
# To rerun only failed scenarios:
# mvn test -Dcucumber.features=@target/cucumber-reports/rerun.txt

# ???????????????????????????????????????????????????????????????????????????
#                           END OF CONFIGURATION
# ???????????????????????????????????????????????????????????????????????????